name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Lint
        run: ./gradlew lintRelease

      - name: Test
        run: ./gradlew test

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK with version
        run: |
          VERSION=$(grep 'app.versionName' gradle.properties | cut -d= -f2)
          cp app/build/outputs/apk/release/app-release.apk fishtank-android-tv-v${VERSION}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: fishtank-android-tv-*.apk
